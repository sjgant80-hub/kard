<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>KARD v3 · the registry duel</title>
<meta name="description" content="KARD v3 · sovereign 3D collectible card game where every card is a Fall* estate repo. prime 787.">
<link rel="manifest" href='data:application/manifest+json,{"name":"KARD v3","short_name":"KARD","start_url":"./","display":"standalone","background_color":"%230b0a0f","theme_color":"%23ff8c00","icons":[{"src":"data:image/svg+xml;utf8,<svg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 192 192%27><rect width=%27192%27 height=%27192%27 fill=%27%230b0a0f%27 rx=%2828%27/><text x=%2796%27 y=%27130%27 font-family=%27Georgia, serif%27 font-size=%27108%27 font-weight=%27700%27 text-anchor=%27middle%27 fill=%27%23ff8c00%27>◊</text></svg>","sizes":"192x192","type":"image/svg+xml"}]}'>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@400;600&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --void:#0b0a0f; --void-2:#13121a; --ink:#1a1922; --ink-2:#22212c;
  --line:#2a2934; --line-soft:#1f1e28;
  --cream:#e6e1d6; --cream-dim:#a8a395; --cream-muted:#6e6a5e;
  --brass:#b8974a; --amber:#ff8c00; --ox:#8b1a1a;
  --green:#4ade80; --red:#ef4444; --blue:#60a5fa; --yellow:#fbbf24;
  --serif:'Cinzel',Georgia,'Libre Baskerville',ui-serif,serif;
  --sans:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  --mono:'IBM Plex Mono','SF Mono',ui-monospace,Menlo,monospace;

  --f-architect:#5b8fb9;
  --f-baron:#d4af37;
  --f-banker:#3d7a4f;
  --f-mage:#8b5cf6;
  --f-seer:#22d3ee;
  --f-justicar:#c0c0c0;
  --f-herald:#c8421a;
  --f-scribe:#e6dcc4;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:var(--sans);color:var(--cream);background:var(--void);font-size:13px;line-height:1.45}
button{font-family:inherit;color:inherit;background:none;border:none;cursor:pointer}
input,select{font-family:inherit;color:inherit;background:var(--ink);border:1px solid var(--line);padding:6px 8px;border-radius:4px;font-size:12px}

/* layout */
#app{display:grid;grid-template-rows:48px 1fr;height:100vh}
#topbar{display:flex;align-items:center;gap:14px;padding:0 14px;background:linear-gradient(180deg,var(--void-2),var(--void));border-bottom:1px solid var(--line)}
.brand{display:flex;align-items:center;gap:10px;font-family:var(--serif);font-weight:700;letter-spacing:.5px}
.brand .glyph{font-size:22px;background:linear-gradient(135deg,var(--brass),var(--amber));-webkit-background-clip:text;background-clip:text;color:transparent}
.brand .name{color:var(--cream);font-size:14px}
.brand .ver{color:var(--cream-muted);font-size:10px;font-family:var(--mono);margin-left:4px}
.spacer{flex:1}
.tbtn{padding:6px 10px;border:1px solid var(--line);border-radius:4px;background:var(--ink);color:var(--cream-dim);font-size:11px;text-transform:uppercase;letter-spacing:.6px}
.tbtn:hover{color:var(--cream);border-color:var(--brass)}
.tbtn.primary{color:var(--amber);border-color:var(--brass)}
.badge{font-family:var(--mono);font-size:10px;padding:3px 7px;border:1px solid var(--line);border-radius:3px;color:var(--cream-muted)}
.badge.t3{color:var(--green);border-color:var(--green)}
.turn-ind{font-family:var(--mono);font-size:11px;color:var(--brass);padding:4px 8px;border:1px solid var(--line);border-radius:3px}

#main{display:grid;grid-template-columns:280px 1fr 260px;height:calc(100vh - 48px);overflow:hidden}
#left,#right{background:var(--void-2);border-right:1px solid var(--line);overflow:hidden;display:flex;flex-direction:column}
#right{border-right:none;border-left:1px solid var(--line)}
.panel-hd{padding:10px 12px;border-bottom:1px solid var(--line);font-family:var(--serif);font-size:12px;letter-spacing:.8px;text-transform:uppercase;color:var(--brass);display:flex;align-items:center;gap:8px}
.panel-hd .pill{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--cream-muted);text-transform:none;letter-spacing:0}
.panel-bd{flex:1;overflow:auto;padding:8px}

#centre{position:relative;background:radial-gradient(ellipse at center,#15131c 0%,#0b0a0f 70%)}
#scene{position:absolute;inset:0}
#hud{position:absolute;top:8px;left:50%;transform:translateX(-50%);display:flex;gap:10px;align-items:center;background:rgba(11,10,15,.7);border:1px solid var(--line);border-radius:6px;padding:6px 12px;font-family:var(--mono);font-size:11px;backdrop-filter:blur(8px)}
#hud .hp{color:var(--red)}
#hud .mp{color:var(--blue)}
#hud .me-hp{color:var(--green)}

/* card pool entries */
.card-row{display:flex;gap:6px;padding:6px;border:1px solid var(--line-soft);border-radius:4px;margin-bottom:4px;cursor:pointer;align-items:center;background:var(--ink);transition:all .12s}
.card-row:hover{border-color:var(--brass);background:var(--ink-2)}
.card-row.in-deck{opacity:.5}
.card-row .cost{width:22px;height:22px;border-radius:50%;background:var(--blue);color:#000;display:grid;place-items:center;font-weight:700;font-size:11px;font-family:var(--mono);flex-shrink:0}
.card-row .meta{flex:1;min-width:0}
.card-row .nm{font-size:11px;color:var(--cream);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600}
.card-row .sub{font-size:9px;color:var(--cream-muted);font-family:var(--mono);text-transform:uppercase}
.card-row .stats{font-family:var(--mono);font-size:10px;color:var(--brass);flex-shrink:0;padding-left:4px}
.card-row.legendary{box-shadow:inset 3px 0 0 var(--amber)}
.card-row.epic{box-shadow:inset 3px 0 0 var(--f-mage)}
.card-row.rare{box-shadow:inset 3px 0 0 var(--blue)}

/* deck builder controls */
.dk-tools{padding:8px;border-bottom:1px solid var(--line);display:flex;flex-direction:column;gap:6px}
.dk-tools .row{display:flex;gap:4px;flex-wrap:wrap}
.dk-tools select,.dk-tools input{flex:1;min-width:60px;font-size:11px;padding:4px 6px}
.dk-curve{display:flex;align-items:flex-end;gap:2px;height:30px;padding:4px}
.dk-curve .bar{flex:1;background:var(--brass);min-height:1px;position:relative}
.dk-curve .bar span{position:absolute;bottom:-12px;left:0;right:0;text-align:center;font-size:8px;color:var(--cream-muted);font-family:var(--mono)}
.dk-status{padding:4px 8px;font-size:10px;font-family:var(--mono);color:var(--cream-muted);text-align:center;border-bottom:1px solid var(--line)}
.dk-status.valid{color:var(--green)}
.dk-status.invalid{color:var(--red)}

/* tabs */
.tabs{display:flex;border-bottom:1px solid var(--line);background:var(--ink)}
.tab{flex:1;padding:8px 6px;text-align:center;font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--cream-muted);cursor:pointer;border-bottom:2px solid transparent}
.tab.active{color:var(--amber);border-bottom-color:var(--brass);background:var(--void-2)}
.tab-panel{display:none}
.tab-panel.active{display:block}

/* hand overlay */
#hand{position:absolute;bottom:0;left:0;right:0;height:160px;display:flex;justify-content:center;align-items:flex-end;pointer-events:none;perspective:1000px}
.hand-card{pointer-events:auto;width:90px;height:130px;margin:0 -18px;border-radius:6px;border:2px solid var(--brass);background:var(--ink-2);position:relative;cursor:pointer;transition:transform .2s,margin .2s;box-shadow:0 4px 12px rgba(0,0,0,.6);display:flex;flex-direction:column;overflow:hidden}
.hand-card:hover{transform:translateY(-30px) scale(1.15);z-index:10;margin:0 4px}
.hand-card .h-cost{position:absolute;top:-6px;left:-6px;width:22px;height:22px;border-radius:50%;background:var(--blue);color:#000;display:grid;place-items:center;font-weight:700;font-size:11px;font-family:var(--mono);border:2px solid var(--cream)}
.hand-card .h-art{flex:1;background:var(--void);position:relative;overflow:hidden}
.hand-card .h-art canvas{width:100%;height:100%;display:block}
.hand-card .h-name{font-family:var(--serif);font-size:8px;text-align:center;padding:2px;background:var(--ink);color:var(--cream);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hand-card .h-stats{display:flex;justify-content:space-between;padding:2px 4px;background:linear-gradient(180deg,#000,var(--ink));font-family:var(--mono);font-size:10px;font-weight:700}
.hand-card .h-atk{color:var(--yellow)}
.hand-card .h-hp{color:var(--red)}
.hand-card.unplayable{filter:grayscale(.6);cursor:not-allowed;opacity:.7}
.hand-card.dragging{opacity:.3}

/* log */
.log{font-family:var(--mono);font-size:10px;color:var(--cream-dim);padding:4px 6px;border-bottom:1px solid var(--line-soft)}
.log.evt{color:var(--brass)}
.log.dmg{color:var(--red)}
.log.heal{color:var(--green)}
.log.mine{color:var(--cream)}
.log.foe{color:var(--cream-muted)}

/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.78);display:none;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(6px)}
.modal-bg.show{display:flex}
.modal{background:var(--void-2);border:1px solid var(--brass);border-radius:8px;max-width:520px;width:92%;max-height:88vh;overflow:auto;box-shadow:0 12px 48px rgba(0,0,0,.8)}
.modal-hd{padding:14px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;font-family:var(--serif);color:var(--amber)}
.modal-hd .x{margin-left:auto;color:var(--cream-muted);font-size:18px;background:none;border:none;cursor:pointer}
.modal-bd{padding:18px}
.cd-row{display:flex;gap:14px;margin-bottom:14px}
.cd-art{width:140px;height:200px;border:2px solid var(--brass);border-radius:6px;background:var(--ink);flex-shrink:0;overflow:hidden}
.cd-art canvas{width:100%;height:100%;display:block}
.cd-info{flex:1;font-size:12px}
.cd-info dl{display:grid;grid-template-columns:auto 1fr;gap:4px 10px;font-family:var(--mono);font-size:11px}
.cd-info dt{color:var(--cream-muted);text-transform:uppercase;font-size:10px}
.cd-info dd{color:var(--cream)}
.cd-abil{padding:10px;background:var(--ink);border-left:3px solid var(--brass);border-radius:3px;margin-top:10px;font-size:11px;color:var(--cream-dim);font-style:italic}
.cd-actions{display:flex;gap:8px;margin-top:14px}
.cd-actions .tbtn{padding:8px 14px;font-size:11px}

/* palette */
.palette-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:flex-start;justify-content:center;padding-top:120px;z-index:200;backdrop-filter:blur(4px)}
.palette-bg.show{display:flex}
.palette{width:580px;max-width:92%;background:var(--void-2);border:1px solid var(--brass);border-radius:6px;box-shadow:0 12px 48px rgba(0,0,0,.8)}
.palette-hd{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--line)}
.palette-hd .glyph{font-family:var(--serif);color:var(--amber);font-size:18px}
.palette-hd input{flex:1;background:transparent;border:none;outline:none;font-size:14px;color:var(--cream)}
.palette-bd{max-height:50vh;overflow:auto;padding:8px 0}
.p-item{padding:8px 14px;cursor:pointer;font-size:12px;border-left:2px solid transparent}
.p-item:hover{background:var(--ink);border-left-color:var(--brass)}
.p-item .sub{font-size:10px;color:var(--cream-muted);font-family:var(--mono)}

/* mint chip */
.nft-tok{font-family:var(--mono);font-size:9px;color:var(--green);padding:2px 6px;border:1px solid var(--green);border-radius:3px;display:inline-block;margin-top:4px;word-break:break-all}

/* deck list */
.deck-card{display:flex;align-items:center;padding:5px 8px;border-bottom:1px solid var(--line-soft);font-size:11px;cursor:pointer}
.deck-card:hover{background:var(--ink)}
.deck-card .dc-cost{width:18px;height:18px;background:var(--blue);color:#000;border-radius:50%;display:grid;place-items:center;font-size:9px;font-weight:700;font-family:var(--mono);margin-right:8px;flex-shrink:0}
.deck-card .dc-nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.deck-card .dc-ct{font-family:var(--mono);color:var(--brass);font-size:10px}
.deck-card .dc-rm{margin-left:6px;color:var(--ox);font-size:14px;line-height:1}

/* setting panel */
.set-row{margin-bottom:10px}
.set-row label{display:block;font-size:10px;text-transform:uppercase;color:var(--cream-muted);margin-bottom:4px;font-family:var(--mono);letter-spacing:.5px}
.set-row input{width:100%}

/* mobile */
@media(max-width:880px){
  #main{grid-template-columns:1fr}
  #left,#right{display:none;position:absolute;top:48px;bottom:0;width:280px;z-index:50}
  #left.show,#right.show{display:flex}
  #right{right:0}
  #hand{height:130px}
  .hand-card{width:72px;height:104px}
}

/* in-match deck-builder hidden */
.in-match #left .builder-only{display:none}
.in-match #left .match-only{display:block}
#left .match-only{display:none}

.h-abil-icons{position:absolute;bottom:18px;left:2px;display:flex;gap:1px}
.h-abil-icons .ai{width:10px;height:10px;border-radius:50%;font-size:7px;display:grid;place-items:center;font-weight:700;font-family:var(--mono)}
.empty-state{padding:30px 16px;text-align:center;color:var(--cream-muted);font-size:11px}
.empty-state .glyph{font-family:var(--serif);font-size:32px;color:var(--brass);display:block;margin-bottom:8px}
</style>
</head>

<div id="app">
  <div id="topbar">
    <div class="brand"><span class="glyph">◊</span><span class="name">KARD <span style="color:var(--amber)">v3</span></span><span class="ver">· the registry duel · prime 787</span></div>

    <main id="centre">

      <div class="tab-panel" data-panel="hist" id="histPanel" style="flex:1;overflow:auto;padding:6px"></div>
      <div class="tab-panel" data-panel="wallet" id="walletPanel" style="flex:1;overflow:auto;padding:6px"></div>
    </aside>
  </div>
</div>

<!-- card detail modal -->
<div class="modal-bg" id="cardModal">
  <div class="modal">
    <div class="modal-hd"><span id="cdTitle">card</span><button class="x" id="cdClose">×</button></div>
    <div class="modal-bd" id="cdBody"></div>

</div>

<!-- settings modal -->
<div class="modal-bg" id="setModal">
  <div class="modal">

      <div style="margin-top:14px;font-size:11px;color:var(--cream-muted);font-family:var(--mono)">prime 787 · 787 mod 127 = 25 = 5² · double-hot mark<br>KONOMI sovereign · ◊·κ=1 · MIT</div>
    </div>

</div>

<!-- omega palette -->
<div class="palette-bg" id="palette">
  <div class="palette">
    <div class="palette-hd"><span class="glyph">Ω</span><input id="pInput" placeholder="build me a deck around BARON, find legendaries, show history…"><span class="badge" id="pTier">T0</span></div>
    <div class="palette-bd" id="pBody"></div>
  </div>
</div>

<script type="module">
import * as THREE from 'three';
import {OrbitControls} from 'three/addons/controls/OrbitControls.js';

// ============================================================
// KARD v3 · sovereign · prime 787 · registry-driven · 3D
// ============================================================
const TOOLNAME='kard-v3';
const PRIME=787;
const VERSION='3.0.0';
const REGISTRY_URL='https://raw.githubusercontent.com/sjgant80-hub/main/fall-registry/main/index.json';
const REGISTRY_URL_PRIMARY='https://raw.githubusercontent.com/sjgant80-hub/fall-registry/main/index.json';

// ---------- IDB ----------
const IDB={
  _db:null,
  async open(){if(this._db)return this._db;return new Promise((res,rej)=>{
    const r=indexedDB.open('kard-v3',1);
    r.onupgradeneeded=e=>{const db=e.target.result;
      if(!db.objectStoreNames.contains('decks'))db.createObjectStore('decks',{keyPath:'slot'});
      if(!db.objectStoreNames.contains('matches'))db.createObjectStore('matches',{keyPath:'id',autoIncrement:true});
      if(!db.objectStoreNames.contains('wallet'))db.createObjectStore('wallet',{keyPath:'tokenId'});
      if(!db.objectStoreNames.contains('settings'))db.createObjectStore('settings',{keyPath:'k'});
      if(!db.objectStoreNames.contains('pool'))db.createObjectStore('pool',{keyPath:'id'});
    };
    r.onsuccess=()=>{this._db=r.result;res(this._db)};
    r.onerror=()=>rej(r.error);
  })},
  async put(store,val){const db=await this.open();return new Promise((res,rej)=>{const tx=db.transaction(store,'readwrite');tx.objectStore(store).put(val);tx.oncomplete=res;tx.onerror=()=>rej(tx.error)})},
  async get(store,key){const db=await this.open();return new Promise((res,rej)=>{const tx=db.transaction(store,'readonly');const r=tx.objectStore(store).get(key);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)})},
  async all(store){const db=await this.open();return new Promise((res,rej)=>{const tx=db.transaction(store,'readonly');const r=tx.objectStore(store).getAll();r.onsuccess=()=>res(r.result||[]);r.onerror=()=>rej(r.error)})},
  async del(store,key){const db=await this.open();return new Promise((res,rej)=>{const tx=db.transaction(store,'readwrite');tx.objectStore(store).delete(key);tx.oncomplete=res;tx.onerror=()=>rej(tx.error)})},
  async clear(store){const db=await this.open();return new Promise((res,rej)=>{const tx=db.transaction(store,'readwrite');tx.objectStore(store).clear();tx.oncomplete=res;tx.onerror=()=>rej(tx.error)})},
};

// ---------- prime math ----------
const SPINES=[2,3,5,7,11,13,17];
function countSpineFactors(r){let c=0;for(const s of SPINES){if(r%s===0)c++}return c}
function spineFactors(r){return SPINES.filter(s=>r%s===0)}

// ---------- faction map ----------
const FACTIONS={
  ARCHITECT:{col:'#5b8fb9',cat:'infrastructure',motif:'grid'},
  BARON:{col:'#d4af37',cat:'enterprise',motif:'crown'},
  BANKER:{col:'#3d7a4f',cat:'finance',motif:'coin'},
  MAGE:{col:'#8b5cf6',cat:'creative',motif:'star'},
  SEER:{col:'#22d3ee',cat:'visualization',motif:'eye'},
  JUSTICAR:{col:'#c0c0c0',cat:'guild',motif:'scales'},
  HERALD:{col:'#c8421a',cat:'sales',motif:'flame'},
  SCRIBE:{col:'#e6dcc4',cat:'productivity',motif:'rune'},
};
function categoryToFaction(cat){
  if(!cat)return 'SCRIBE';
  const c=String(cat).toLowerCase();
  for(const[f,m]of Object.entries(FACTIONS)){if(c.includes(m.cat))return f}
  // heuristics
  if(/data|chart|viz/.test(c))return'SEER';
  if(/code|build|infra|deploy/.test(c))return'ARCHITECT';
  if(/art|create|paint|design/.test(c))return'MAGE';
  if(/money|bank|finance|tax/.test(c))return'BANKER';
  if(/sell|sale|market/.test(c))return'HERALD';
  if(/note|task|todo/.test(c))return'SCRIBE';
  if(/law|guild|legal/.test(c))return'JUSTICAR';
  if(/biz|enterprise|firm/.test(c))return'BARON';
  return'SCRIBE';
}

// ---------- abilities ----------
const ABILITY_DESC={
  BATTLECRY:{name:'battlecry',sym:'B',col:'#fbbf24',desc:'on play, deal 1 dmg to a random enemy minion'},
  PIERCE:{name:'pierce',sym:'P',col:'#ef4444',desc:'when attacking a minion, excess damage hits hero'},
  SPELLPOWER:{name:'spell power',sym:'S',col:'#8b5cf6',desc:'while on board, your battlecries deal +1'},
  LIFESTEAL:{name:'lifesteal',sym:'L',col:'#4ade80',desc:'damage dealt heals your hero'},
  CHARGE:{name:'charge',sym:'C',col:'#ff8c00',desc:'can attack the turn it is summoned'},
  DIVINESHIELD:{name:'divine shield',sym:'D',col:'#c0c0c0',desc:'ignores first damage taken'},
  DEATHRATTLE:{name:'deathrattle',sym:'R',col:'#60a5fa',desc:'on death, draw a card'},
};
function abilityFor(r,app){
  const out=[];
  if(r%2===0)out.push('BATTLECRY');
  if(r%3===0)out.push('PIERCE');
  if(r%5===0)out.push('SPELLPOWER');
  if(r%7===0)out.push('LIFESTEAL');
  if(r%11===0)out.push('CHARGE');
  if(r%13===0)out.push('DIVINESHIELD');
  if(r%17===0)out.push('DEATHRATTLE');
  // linear-spine identity: prime itself is a spine
  if(SPINES.includes(app.prime)){
    const s=app.prime; const m={2:'BATTLECRY',3:'PIERCE',5:'SPELLPOWER',7:'LIFESTEAL',11:'CHARGE',13:'DIVINESHIELD',17:'DEATHRATTLE'};
    if(!out.includes(m[s]))out.push(m[s]);
  }
  return out;
}

// ---------- repoToCard ----------
function repoToCard(app){
  const prime=app.prime||2;
  const cost=Math.max(1,Math.min(10,Math.floor(Math.log10(prime))+1));
  const tier=app.tier||'C';
  const rarity=({A:'legendary',B:'epic',C:'rare'})[tier]||'common';
  const baseAttack=({legendary:6,epic:4,rare:3,common:2})[rarity];
  const r=prime%127;
  const spineWeight=countSpineFactors(r);
  const health=Math.max(1,Math.min(12,baseAttack+spineWeight));
  const faction=categoryToFaction(app.category);
  const ability=abilityFor(r,app);
  return{
    id:app.name,name:app.name,prime,cost,attack:baseAttack,health,
    rarity,faction,ability,app,
    modResidue:r,spineFactors:spineFactors(r)
  };
}

async function loadRegistry(){
  let entries=null;
  try{
    const r=await fetch(REGISTRY_URL_PRIMARY,{cache:'no-store'});
    if(r.ok){
      const d=await r.json();
      entries=Array.isArray(d)?d:(d.apps||d.entries||d.tools||d.estate||null);
    }
  }catch(e){}
  if(!entries||entries.length<20){
    log('registry offline · using cached fallback','evt');
    entries=FALLBACK_REGISTRY;
  }else{
    log(`registry loaded · ${entries.length} entries`,'evt');
    // merge fallback for completeness
    const names=new Set(entries.map(e=>e.name));
    for(const e of FALLBACK_REGISTRY)if(!names.has(e.name))entries.push(e);
  }
  state.pool=entries.filter(e=>e&&e.name&&e.prime).map(repoToCard);
  // cache to IDB
  try{await IDB.clear('pool');for(const c of state.pool)await IDB.put('pool',c)}catch(e){}
  // factions list
  const fset=new Set(state.pool.map(c=>c.faction));
  state.factions=[...fset];
  const ff=el('factionFilter');
  for(const f of state.factions){const o=document.createElement('option');o.value=f;o.textContent=f;ff.appendChild(o)}
  $('#poolBadge').textContent=`${state.pool.length} cards`;
  renderPool();
}

// ---------- procedural card art ----------
function paintCard(card,canvas){
  const ctx=canvas.getContext('2d');
  const W=canvas.width,H=canvas.height;
  const col=FACTIONS[card.faction]?.col||'#888';
  // bg gradient
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#13121a');g.addColorStop(1,'#0b0a0f');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  // sacred geometry from spine factors
  const cx=W/2,cy=H/2;
  const factors=card.spineFactors||[];
  ctx.strokeStyle=col;ctx.globalAlpha=.5;
  // rings
  for(let i=0;i<Math.max(1,factors.length);i++){
    ctx.beginPath();ctx.arc(cx,cy,8+i*10,0,Math.PI*2);ctx.lineWidth=1;ctx.stroke();
  }
  // star pattern based on first factor
  const f=factors[0]||2;
  ctx.globalAlpha=.8;ctx.lineWidth=1.2;
  ctx.beginPath();
  for(let i=0;i<f*2;i++){
    const a=(i/(f*2))*Math.PI*2;
    const r=i%2===0?28:14;
    const x=cx+Math.cos(a)*r,y=cy+Math.sin(a)*r;
    if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
  }
  ctx.closePath();ctx.stroke();
  // prime mark
  ctx.globalAlpha=1;
  ctx.fillStyle=col;ctx.font='bold 9px monospace';ctx.textAlign='center';
  ctx.fillText('π '+card.prime,cx,H-4);
  // frame
  ctx.globalAlpha=1;
  ctx.strokeStyle='#b8974a';ctx.lineWidth=2;
  ctx.strokeRect(1,1,W-2,H-2);
  ctx.strokeStyle=col;ctx.lineWidth=1;
  ctx.strokeRect(4,4,W-8,H-8);
}

// procedural texture for 3D card face (larger)
function makeCardTexture(card){
  const c=document.createElement('canvas');
  c.width=256;c.height=360;
  const ctx=c.getContext('2d');
  const col=FACTIONS[card.faction]?.col||'#888';
  // bg
  const g=ctx.createLinearGradient(0,0,0,360);
  g.addColorStop(0,'#1a1922');g.addColorStop(.5,'#13121a');g.addColorStop(1,'#0b0a0f');
  ctx.fillStyle=g;ctx.fillRect(0,0,256,360);
  // brass frame
  ctx.strokeStyle='#b8974a';ctx.lineWidth=6;ctx.strokeRect(3,3,250,354);
  ctx.strokeStyle=col;ctx.lineWidth=2;ctx.strokeRect(10,10,236,340);
  // portrait area
  ctx.fillStyle='#0b0a0f';ctx.fillRect(18,40,220,180);
  // sacred geometry portrait
  const cx=128,cy=130;
  const factors=card.spineFactors||[];
  ctx.strokeStyle=col;ctx.globalAlpha=.6;
  for(let i=0;i<Math.max(1,factors.length);i++){
    ctx.beginPath();ctx.arc(cx,cy,18+i*15,0,Math.PI*2);ctx.lineWidth=1.5;ctx.stroke();
  }
  const f=factors[0]||2;
  ctx.globalAlpha=1;ctx.lineWidth=2;
  ctx.beginPath();
  for(let i=0;i<f*2;i++){
    const a=(i/(f*2))*Math.PI*2-Math.PI/2;
    const r=i%2===0?60:30;
    const x=cx+Math.cos(a)*r,y=cy+Math.sin(a)*r;
    if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
  }
  ctx.closePath();ctx.stroke();
  // cost gem
  ctx.beginPath();ctx.arc(28,28,20,0,Math.PI*2);
  ctx.fillStyle='#60a5fa';ctx.fill();
  ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle='#000';ctx.font='bold 22px serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(card.cost,28,28);
  // name banner
  ctx.fillStyle='rgba(184,151,74,.85)';ctx.fillRect(18,232,220,28);
  ctx.fillStyle='#0b0a0f';ctx.font='bold 13px serif';ctx.textAlign='center';ctx.textBaseline='middle';
  let nm=card.name;if(nm.length>22)nm=nm.slice(0,20)+'…';
  ctx.fillText(nm,128,246);
  // rarity gem
  const rcol={legendary:'#ff8c00',epic:'#8b5cf6',rare:'#60a5fa',common:'#999'}[card.rarity];
  ctx.beginPath();ctx.moveTo(128,272);ctx.lineTo(136,282);ctx.lineTo(128,292);ctx.lineTo(120,282);ctx.closePath();
  ctx.fillStyle=rcol;ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=1;ctx.stroke();
  // ability icons
  let ax=20;
  for(const ab of card.ability.slice(0,5)){
    const a=ABILITY_DESC[ab];if(!a)continue;
    ctx.beginPath();ctx.arc(ax+10,310,10,0,Math.PI*2);
    ctx.fillStyle=a.col;ctx.fill();
    ctx.fillStyle='#000';ctx.font='bold 11px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(a.sym,ax+10,310);
    ax+=22;
  }
  // attack
  ctx.beginPath();ctx.moveTo(18,340);ctx.lineTo(46,340);ctx.lineTo(50,360);ctx.lineTo(14,360);ctx.closePath();
  ctx.fillStyle='#fbbf24';ctx.fill();ctx.strokeStyle='#000';ctx.lineWidth=1;ctx.stroke();
  ctx.fillStyle='#000';ctx.font='bold 18px serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(card.attack,30,350);
  // health
  ctx.beginPath();ctx.arc(232,350,16,0,Math.PI*2);
  ctx.fillStyle='#ef4444';ctx.fill();ctx.strokeStyle='#000';ctx.stroke();
  ctx.fillStyle='#fff';ctx.fillText(card.health,232,350);
  // prime mark
  ctx.fillStyle=col;ctx.font='9px monospace';ctx.textAlign='right';ctx.textBaseline='top';
  ctx.fillText('π '+card.prime,238,18);
  ctx.fillStyle='#a8a395';ctx.font='8px monospace';ctx.textAlign='left';
  ctx.fillText(card.faction,18,18);
  const tex=new THREE.CanvasTexture(c);
  tex.colorSpace=THREE.SRGBColorSpace;
  tex.needsUpdate=true;
  return tex;
}

      ctx.fillText('◊',64,90);
      ctx.fillStyle='#b8974a';ctx.font='8px monospace';ctx.fillText('KARD v3',64,170);
      const tex=new THREE.CanvasTexture(c);tex.colorSpace=THREE.SRGBColorSpace;
      mat=[new THREE.MeshStandardMaterial({color:0x1a1922}),new THREE.MeshStandardMaterial({color:0x1a1922}),
           new THREE.MeshStandardMaterial({map:tex,roughness:.5}),new THREE.MeshStandardMaterial({map:tex,roughness:.5}),
           new THREE.MeshStandardMaterial({color:0x1a1922}),new THREE.MeshStandardMaterial({color:0x1a1922})];
    }else{
      const tex=makeCardTexture(card);
      mat=[new THREE.MeshStandardMaterial({color:0x1a1922}),new THREE.MeshStandardMaterial({color:0x1a1922}),
           new THREE.MeshStandardMaterial({map:tex,roughness:.4}),new THREE.MeshStandardMaterial({map:tex,roughness:.4}),
           new THREE.MeshStandardMaterial({color:0x1a1922}),new THREE.MeshStandardMaterial({color:0x1a1922})];
    }
    const m=new THREE.Mesh(geom,mat);
    m.castShadow=true;m.userData.card=card;
    g.add(m);
    return g;
  },
  renderBoard(){
    // minions
    ['me','foe'].forEach(side=>{
      this.minionMeshes[side].forEach(mm=>this.scene.remove(mm.group));
      this.minionMeshes[side]=[];
      const board=state.match.board[side];
      const z=side==='me'?2:-2;
      board.forEach((m,i)=>{
        const grp=this.makeCardMesh(m.card,false);
        const x=(i-(board.length-1)/2)*1.5;
        grp.position.set(x,.3,z);
        grp.rotation.x=-Math.PI/2;
        if(side==='foe')grp.rotation.z=Math.PI;
        grp.userData.boardIdx=i;
        grp.userData.side=side;
        grp.userData.minion=m;
        // health indicator
        const txtCanvas=document.createElement('canvas');txtCanvas.width=128;txtCanvas.height=64;
        const tctx=txtCanvas.getContext('2d');
        tctx.fillStyle='rgba(0,0,0,.7)';tctx.fillRect(0,0,128,64);
        tctx.fillStyle='#fbbf24';tctx.font='bold 28px serif';tctx.textAlign='center';
        tctx.fillText(m.atk,32,42);
        tctx.fillStyle='#ef4444';tctx.fillText(m.hp,96,42);
        const tex=new THREE.CanvasTexture(txtCanvas);tex.colorSpace=THREE.SRGBColorSpace;
        const plane=new THREE.Mesh(new THREE.PlaneGeometry(.6,.3),new THREE.MeshBasicMaterial({map:tex,transparent:true}));
        plane.position.set(0,.06,.7);
        plane.rotation.z=side==='foe'?Math.PI:0;
        grp.add(plane);
        // glow if can attack
        if(m.canAttack){
          const ringGeom=new THREE.RingGeometry(.7,.85,32);
          const ringMat=new THREE.MeshBasicMaterial({color:0x4ade80,transparent:true,opacity:.5,side:THREE.DoubleSide});
          const ring=new THREE.Mesh(ringGeom,ringMat);ring.position.y=-.02;
          grp.add(ring);
        }
        if(m.divineShield){
          const ringGeom=new THREE.RingGeometry(.78,.9,32);
          const ringMat=new THREE.MeshBasicMaterial({color:0xc0c0c0,transparent:true,opacity:.6,side:THREE.DoubleSide});
          const ring=new THREE.Mesh(ringGeom,ringMat);ring.position.y=.06;
          grp.add(ring);
        }
        this.scene.add(grp);
        this.minionMeshes[side].push({group:grp,minion:m,side,idx:i});
      });
    });
    // heroes (refresh HP textures)
    this.updateHero('me');this.updateHero('foe');
    // mana
    this.updateManaCrystals('me',state.match.mana.me,state.match.maxMana.me);
    this.updateManaCrystals('foe',state.match.mana.foe,state.match.maxMana.foe);
    // deck stacks
    this.updateDeckStack('me',state.match.deck.me.length);
    this.updateDeckStack('foe',state.match.deck.foe.length);
  },
  updateHero(side){
    const h=this.heroes[side];
    // remove old hp label
    h.children.filter(c=>c.userData.isLabel).forEach(c=>h.remove(c));
    const hp=state.match.hp[side];
    const txtCanvas=document.createElement('canvas');txtCanvas.width=128;txtCanvas.height=64;
    const tctx=txtCanvas.getContext('2d');
    tctx.fillStyle='rgba(11,10,15,.85)';tctx.fillRect(0,0,128,64);
    tctx.strokeStyle='#b8974a';tctx.lineWidth=3;tctx.strokeRect(0,0,128,64);
    tctx.fillStyle=side==='me'?'#4ade80':'#ef4444';tctx.font='bold 36px serif';tctx.textAlign='center';tctx.textBaseline='middle';
    tctx.fillText('♥ '+hp,64,32);
    const tex=new THREE.CanvasTexture(txtCanvas);tex.colorSpace=THREE.SRGBColorSpace;
    const plane=new THREE.Mesh(new THREE.PlaneGeometry(1.2,.6),new THREE.MeshBasicMaterial({map:tex,transparent:true}));
    plane.position.set(0,-1.1,0);
    plane.rotation.x=-Math.PI/4;
    plane.userData.isLabel=true;
    h.add(plane);
  },
  burst(x,y,z,col){
    const cnt=20;
    const geom=new THREE.BufferGeometry();
    const positions=new Float32Array(cnt*3);
    const vels=[];
    for(let i=0;i<cnt;i++){
      positions[i*3]=x;positions[i*3+1]=y;positions[i*3+2]=z;
      vels.push({x:(Math.random()-.5)*.3,y:Math.random()*.3,z:(Math.random()-.5)*.3});
    }
    geom.setAttribute('position',new THREE.BufferAttribute(positions,3));
    const mat=new THREE.PointsMaterial({color:col,size:.15,transparent:true,opacity:1});
    const pts=new THREE.Points(geom,mat);
    this.scene.add(pts);
    this.particles.push({pts,vels,life:1,positions});
  },
  onResize(){
    const c=document.getElementById('scene');
    const w=c.clientWidth,h=c.clientHeight;
    this.camera.aspect=w/h;this.camera.updateProjectionMatrix();
    this.renderer.setSize(w,h);
  },
  onClick(e){
    if(!state.match||state.match.over)return;
    const r=this.renderer.domElement.getBoundingClientRect();
    this.mouse.x=((e.clientX-r.left)/r.width)*2-1;
    this.mouse.y=-((e.clientY-r.top)/r.height)*2+1;
    this.raycaster.setFromCamera(this.mouse,this.camera);
    // collect targets: own minions (select for attack), enemy minions, enemy hero
    const targets=[];
    this.minionMeshes.me.forEach(mm=>targets.push(mm.group));
    this.minionMeshes.foe.forEach(mm=>targets.push(mm.group));
    targets.push(this.heroes.foe);
    targets.push(this.heroes.me);
    const hits=this.raycaster.intersectObjects(targets,true);
    if(!hits.length)return;
    let obj=hits[0].object;
    while(obj&&!obj.userData.minion&&obj!==this.heroes.foe&&obj!==this.heroes.me&&obj.parent)obj=obj.parent;
    // resolve target
    if(obj===this.heroes.foe){Game.handleTarget({type:'hero',side:'foe'})}
    else if(obj===this.heroes.me){Game.handleTarget({type:'hero',side:'me'})}
    else if(obj.userData.minion){Game.handleTarget({type:'minion',side:obj.userData.side,idx:obj.userData.boardIdx,minion:obj.userData.minion})}
  },
  animate(){
    requestAnimationFrame(()=>this.animate());
    if(this.controls)this.controls.update();
    // update particles
    this.particles=this.particles.filter(p=>{
      p.life-=.02;
      if(p.life<=0){this.scene.remove(p.pts);return false}
      const arr=p.pts.geometry.attributes.position.array;
      for(let i=0;i<p.vels.length;i++){
        arr[i*3]+=p.vels[i].x;arr[i*3+1]+=p.vels[i].y;arr[i*3+2]+=p.vels[i].z;
        p.vels[i].y-=.01;
      }
      p.pts.geometry.attributes.position.needsUpdate=true;
      p.pts.material.opacity=p.life;
      return true;
    });
    // gently rotate mana crystals
    if(this.manaCrystals.me)this.manaCrystals.me.children.forEach((m,i)=>{m.rotation.y+=.01+i*.001});
    if(this.manaCrystals.foe)this.manaCrystals.foe.children.forEach((m,i)=>{m.rotation.y+=.01+i*.001});
    this.renderer.render(this.scene,this.camera);
  }
};

// ============================================================
// game loop
// ============================================================
const Game={
  selectedHandIdx:null,    // card being played (target selection)
  selectedAttacker:null,   // friendly minion ready to attack
  newMatch(){
    if(state.deck.length!==30){alert('your deck must be 30 cards');return}
    const myCards=state.deck.map(id=>state.pool.find(c=>c.id===id)).filter(Boolean);
    // build AI deck: random 30
    const aiCards=[];
    const pool=[...state.pool];
    while(aiCards.length<30&&pool.length){
      const c=pool[Math.floor(Math.random()*pool.length)];
      const n=aiCards.filter(x=>x.id===c.id).length;
      const limit=c.rarity==='legendary'?1:2;
      if(n<limit)aiCards.push(c);
    }
    state.match={
      turn:1,active:'me',phase:'play',
      hp:{me:30,foe:30},
      mana:{me:1,foe:0},maxMana:{me:1,foe:0},
      deck:{me:shuffle([...myCards]),foe:shuffle([...aiCards])},
      hand:{me:[],foe:[]},
      board:{me:[],foe:[]},
      log:[],over:false,winner:null,startedAt:Date.now(),turns:0,
      spellPower:{me:0,foe:0}
    };
    // initial draw 3 me, 4 foe (coin compensation)
    for(let i=0;i<3;i++)this.draw('me');
    for(let i=0;i<4;i++)this.draw('foe');
    document.body.classList.add('in-match');
    $('#btnEndTurn').style.display='';
    $('#btnConcede').style.display='';
    $('#btnNewMatch').style.display='none';
    log('match started · you go first','evt');
    Scene.renderBoard();
    this.renderUI();
  },
  draw(side){
    if(state.match.deck[side].length===0){
      // fatigue
      const dmg=(state.match.fatigue=state.match.fatigue||{me:0,foe:0})[side]=(state.match.fatigue[side]||0)+1;
      state.match.hp[side]-=dmg;
      log(`${side==='me'?'you':'foe'} take ${dmg} fatigue damage`,'dmg');
      this.checkWin();
      return;
    }
    const c=state.match.deck[side].shift();
    if(state.match.hand[side].length>=10){
      log(`${side==='me'?'you':'foe'} burn ${c.name} (hand full)`,'evt');
      return;
    }
    state.match.hand[side].push({...c,uid:Math.random().toString(36).slice(2)});
  },
  recomputeSpellPower(side){
    state.match.spellPower[side]=state.match.board[side].filter(m=>m.card.ability.includes('SPELLPOWER')).length;
  },
  playCard(side,handIdx,target){
    const card=state.match.hand[side][handIdx];
    if(!card)return false;
    if(state.match.mana[side]<card.cost){log(`not enough mana for ${card.name}`,'evt');return false}
    if(state.match.board[side].length>=7){log(`board is full`,'evt');return false}
    state.match.mana[side]-=card.cost;
    state.match.hand[side].splice(handIdx,1);
    const minion={
      card,uid:card.uid,atk:card.attack,hp:card.health,maxHp:card.health,
      canAttack:card.ability.includes('CHARGE'),
      divineShield:card.ability.includes('DIVINESHIELD'),
      lifesteal:card.ability.includes('LIFESTEAL'),
      pierce:card.ability.includes('PIERCE'),
      deathrattle:card.ability.includes('DEATHRATTLE'),
      battlecry:card.ability.includes('BATTLECRY')
    };
    state.match.board[side].push(minion);
    log(`${side==='me'?'you':'foe'} play ${card.name}`,side==='me'?'mine':'foe');
    // particle burst at slot
    const pos=this.boardPos(side,state.match.board[side].length-1);
    Scene.burst(pos.x,pos.y+.5,pos.z,parseInt((FACTIONS[card.faction]?.col||'#888').slice(1),16));
    // battlecry
    if(minion.battlecry){
      const enemySide=side==='me'?'foe':'me';
      const enemies=state.match.board[enemySide];
      const spBoost=state.match.spellPower[side]||0;
      if(enemies.length){
        const tgt=enemies[Math.floor(Math.random()*enemies.length)];
        this.dealDamage(tgt,1+spBoost,enemySide,state.match.board[enemySide].indexOf(tgt));
        log(`battlecry: ${1+spBoost} dmg to ${tgt.card.name}`,'dmg');
      }
    }
    this.recomputeSpellPower(side);
    Scene.renderBoard();
    this.renderUI();
    this.checkWin();
    return true;
  },
  boardPos(side,i){
    const board=state.match.board[side];
    const x=(i-(board.length-1)/2)*1.5;
    const z=side==='me'?2:-2;
    return{x,y:.3,z};
  },
  attack(side,attackerIdx,target){
    const attacker=state.match.board[side][attackerIdx];
    if(!attacker||!attacker.canAttack)return false;
    const enemySide=side==='me'?'foe':'me';
    if(target.type==='hero'){
      const dmg=attacker.atk;
      state.match.hp[enemySide]-=dmg;
      log(`${attacker.card.name} attacks hero for ${dmg}`,'dmg');
      if(attacker.lifesteal){state.match.hp[side]=Math.min(30,state.match.hp[side]+dmg);log(`lifesteal heals ${dmg}`,'heal')}
      const pos=Scene.heroes[enemySide].position;
      Scene.burst(pos.x,pos.y,pos.z,0xef4444);
    }else if(target.type==='minion'){
      const tgt=target.minion;
      const tgtSide=target.side;
      if(tgtSide===side){log(`cannot attack own minion`,'evt');return false}
      const tgtIdx=state.match.board[tgtSide].indexOf(tgt);
      // mutual damage
      const dmgToTgt=attacker.atk;
      const dmgToMe=tgt.atk;
      // pierce: excess to face
      const tgtBeforeHp=tgt.hp;
      this.dealDamage(tgt,dmgToTgt,tgtSide,tgtIdx);
      if(attacker.pierce&&dmgToTgt>tgtBeforeHp){
        const excess=dmgToTgt-tgtBeforeHp;
        state.match.hp[enemySide]-=excess;
        log(`pierce: ${excess} dmg to face`,'dmg');
      }
      if(attacker.lifesteal){state.match.hp[side]=Math.min(30,state.match.hp[side]+Math.min(dmgToTgt,tgtBeforeHp));log(`lifesteal heals`,'heal')}
      this.dealDamage(attacker,dmgToMe,side,attackerIdx);
      log(`${attacker.card.name} attacks ${tgt.card.name}`,'dmg');
    }
    attacker.canAttack=false;
    this.cleanupBoard();
    Scene.renderBoard();
    this.renderUI();
    this.checkWin();
    return true;
  },
  dealDamage(minion,dmg,side,idx){
    if(minion.divineShield&&dmg>0){
      minion.divineShield=false;
      log(`divine shield absorbs hit on ${minion.card.name}`,'evt');
      return;
    }
    minion.hp-=dmg;
  },
  cleanupBoard(){
    ['me','foe'].forEach(side=>{
      const dead=state.match.board[side].filter(m=>m.hp<=0);
      dead.forEach(m=>{
        log(`${m.card.name} dies`,'evt');
        const idx=state.match.board[side].indexOf(m);
        const pos=this.boardPos(side,idx);
        Scene.burst(pos.x,pos.y+.3,pos.z,0x666666);
        if(m.deathrattle){this.draw(side);log(`deathrattle: ${side==='me'?'you':'foe'} draw a card`,'evt')}
      });
      state.match.board[side]=state.match.board[side].filter(m=>m.hp>0);
      this.recomputeSpellPower(side);
    });
  },
  endTurn(){
    if(state.match.over)return;
    if(state.match.active==='me'){
      state.match.active='foe';
      state.match.turn++;state.match.turns++;
      state.match.maxMana.foe=Math.min(10,state.match.maxMana.foe+1);
      state.match.mana.foe=state.match.maxMana.foe;
      state.match.board.foe.forEach(m=>m.canAttack=true);
      this.draw('foe');
      log(`— foe turn ${state.match.turn} —`,'foe');
      Scene.renderBoard();this.renderUI();
      setTimeout(()=>this.aiTurn(),700);
    }else{
      state.match.active='me';
      state.match.turn++;state.match.turns++;
      state.match.maxMana.me=Math.min(10,state.match.maxMana.me+1);
      state.match.mana.me=state.match.maxMana.me;
      state.match.board.me.forEach(m=>m.canAttack=true);
      this.draw('me');
      log(`— your turn ${state.match.turn} —`,'mine');
      Scene.renderBoard();this.renderUI();
    }
  },
  aiTurn(){
    if(state.match.over)return;
    // play loop: highest cost card playable
    let played=true;
    while(played){
      played=false;
      const playable=state.match.hand.foe
        .map((c,i)=>({c,i}))
        .filter(x=>x.c.cost<=state.match.mana.foe&&state.match.board.foe.length<7)
        .sort((a,b)=>b.c.cost-a.c.cost);
      if(playable.length){
        this.playCard('foe',playable[0].i,null);
        played=true;
        if(state.match.over)return;
      }
    }
    // attack loop
    setTimeout(()=>{
      const attackers=state.match.board.foe.filter(m=>m.canAttack);
      const doAttack=(i)=>{
        if(i>=attackers.length||state.match.over){setTimeout(()=>this.endTurn(),600);return}
        const a=attackers[i];
        if(!a.canAttack||a.hp<=0){doAttack(i+1);return}
        // taunt-free: pick weakest enemy minion or face
        const enemies=state.match.board.me;
        let target;
        if(enemies.length===0){target={type:'hero'}}
        else{
          // prefer killing a minion if possible
          const killable=enemies.find(e=>e.hp<=a.atk&&e.atk<a.hp);
          if(killable){target={type:'minion',side:'me',minion:killable}}
          else{target={type:'hero'}}
        }
        const idx=state.match.board.foe.indexOf(a);
        this.attack('foe',idx,target);
        setTimeout(()=>doAttack(i+1),500);
      };
      doAttack(0);
    },500);
  },
  handleTarget(t){
    if(state.match.active!=='me'||state.match.over)return;
    // case 1: an attacker is selected
    if(this.selectedAttacker!==null){
      const idx=this.selectedAttacker;
      this.selectedAttacker=null;
      if(t.type==='hero'&&t.side==='foe'){this.attack('me',idx,{type:'hero'})}
      else if(t.type==='minion'&&t.side==='foe'){this.attack('me',idx,t)}
      else{log('invalid target','evt')}
      return;
    }
    // case 2: selecting an attacker (own minion)
    if(t.type==='minion'&&t.side==='me'){
      if(t.minion.canAttack){this.selectedAttacker=state.match.board.me.indexOf(t.minion);log(`select ${t.minion.card.name} (click target)`,'evt')}
      else{log(`${t.minion.card.name} cannot attack yet`,'evt')}
      return;
    }
  },
  checkWin(){
    if(state.match.hp.foe<=0&&state.match.hp.me<=0){this.endMatch('draw')}
    else if(state.match.hp.foe<=0){this.endMatch('me')}
    else if(state.match.hp.me<=0){this.endMatch('foe')}
  },
  async endMatch(winner){
    state.match.over=true;state.match.winner=winner;
    log(winner==='me'?'★ VICTORY ★':winner==='foe'?'☠ DEFEAT ☠':'— DRAW —','evt');
    try{
      await IDB.put('matches',{
        startedAt:state.match.startedAt,endedAt:Date.now(),
        winner,turns:state.match.turns,deckSize:state.deck.length,
        myHp:state.match.hp.me,foeHp:state.match.hp.foe,
        deck:state.deck.slice()
      });
    }catch(e){}
    $('#btnEndTurn').style.display='none';
    $('#btnConcede').style.display='none';
    $('#btnNewMatch').style.display='';
    document.body.classList.remove('in-match');
    renderHistory();
    this.renderUI();
  },
  concede(){if(state.match&&!state.match.over)this.endMatch('foe')},
  renderUI(){
    if(!state.match){$('#turnInd').textContent='— · no match';return}
    $('#turnInd').textContent=`turn ${state.match.turn} · ${state.match.active==='me'?'YOUR TURN':'foe turn'}`;
    $('#hudTurn').textContent=state.match.turn;
    $('#hudMeHp').textContent=state.match.hp.me;
    $('#hudFoeHp').textContent=state.match.hp.foe;
    $('#hudMeMp').textContent=state.match.mana.me;
    $('#hudMeMaxMp').textContent=state.match.maxMana.me;
    $('#hudPhase').textContent=state.match.over?(state.match.winner==='me'?'victory':'defeat'):state.match.active;
    this.renderHand();
    this.renderMatchDeck();
  },
  renderHand(){
    const h=$('#hand');h.innerHTML='';
    if(!state.match)return;
    state.match.hand.me.forEach((card,i)=>{
      const el=document.createElement('div');
      el.className='hand-card';
      const playable=state.match.active==='me'&&state.match.mana.me>=card.cost&&state.match.board.me.length<7&&!state.match.over;
      if(!playable)el.classList.add('unplayable');
      const rcol={legendary:'#ff8c00',epic:'#8b5cf6',rare:'#60a5fa',common:'#999'}[card.rarity];
      el.style.borderColor=rcol;
      const cv=document.createElement('canvas');cv.width=86;cv.height=86;
      el.innerHTML=`<div class="h-cost">${card.cost}</div>
        <div class="h-art"></div>
        <div class="h-name">${esc(card.name)}</div>
        <div class="h-stats"><span class="h-atk">${card.attack}</span><span class="h-hp">${card.health}</span></div>
        <div class="h-abil-icons">${card.ability.slice(0,4).map(a=>`<div class="ai" style="background:${ABILITY_DESC[a].col};color:#000">${ABILITY_DESC[a].sym}</div>`).join('')}</div>`;
      el.querySelector('.h-art').appendChild(cv);
      paintCard(card,cv);
      el.addEventListener('click',(e)=>{
        if(e.shiftKey){showCardDetail(card);return}
        if(playable){
          Game.playCard('me',i,null);
        }else{showCardDetail(card)}
      });
      h.appendChild(el);
    });
  },
  renderMatchDeck(){
    const el=$('#matchDeck');el.innerHTML='';
    if(!state.match){return}
    $('#matchDeckCount').textContent=`${state.match.deck.me.length} left · ${state.match.hand.me.length} in hand`;
    // upcoming
    state.match.deck.me.slice(0,12).forEach(c=>{
      const r=document.createElement('div');
      r.className='card-row '+c.rarity;
      r.innerHTML=`<div class="cost">${c.cost}</div><div class="meta"><div class="nm">${esc(c.name)}</div><div class="sub">${c.faction}</div></div><div class="stats">${c.attack}/${c.health}</div>`;
      r.addEventListener('click',()=>showCardDetail(c));
      el.appendChild(r);
    });
  }
};
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

function renderPool(){
  const filter={
    q:($('#cardSearch')?.value||'').toLowerCase().trim(),
    f:$('#factionFilter')?.value||'',
    r:$('#rarityFilter')?.value||''
  };
  const el=$('#cardPool');el.innerHTML='';
  let shown=0;
  state.pool.forEach(c=>{
    if(filter.q&&!c.name.toLowerCase().includes(filter.q))return;
    if(filter.f&&c.faction!==filter.f)return;
    if(filter.r&&c.rarity!==filter.r)return;
    const cnt=state.deck.filter(id=>id===c.id).length;
    const r=document.createElement('div');
    r.className='card-row '+c.rarity;
    if(cnt>=(c.rarity==='legendary'?1:2))r.classList.add('in-deck');
    r.innerHTML=`<div class="cost">${c.cost}</div>
      <div class="meta"><div class="nm">${esc(c.name)} ${cnt?'×'+cnt:''}</div><div class="sub">${c.faction} · ${c.rarity}</div></div>
      <div class="stats">${c.attack}/${c.health}</div>`;
    r.addEventListener('click',(e)=>{
      if(e.shiftKey){showCardDetail(c);return}
      addToDeck(c);
    });
    r.addEventListener('contextmenu',(e)=>{e.preventDefault();showCardDetail(c)});
    el.appendChild(r);
    shown++;
  });
  if(!shown){el.innerHTML='<div class="empty-state"><span class="glyph">∅</span>no cards match</div>'}
  renderDeck();
}
function addToDeck(c){
  const cnt=state.deck.filter(id=>id===c.id).length;
  const limit=c.rarity==='legendary'?1:2;
  if(cnt>=limit){log(`${c.name} at max copies`,'evt');return}
  if(state.deck.length>=30){log(`deck full`,'evt');return}
  state.deck.push(c.id);
  renderPool();
}
function removeFromDeck(id){
  const i=state.deck.indexOf(id);if(i<0)return;
  state.deck.splice(i,1);
  renderPool();
}
function renderDeck(){
  const el=$('#currentDeck');el.innerHTML='';
  // group by id
  const counts={};
  state.deck.forEach(id=>counts[id]=(counts[id]||0)+1);
  const sorted=Object.keys(counts).map(id=>state.pool.find(c=>c.id===id)).filter(Boolean).sort((a,b)=>a.cost-b.cost);
  sorted.forEach(c=>{
    const r=document.createElement('div');
    r.className='deck-card';
    r.innerHTML=`<div class="dc-cost">${c.cost}</div><div class="dc-nm">${esc(c.name)}</div><div class="dc-ct">×${counts[c.id]}</div><div class="dc-rm">−</div>`;
    r.querySelector('.dc-rm').addEventListener('click',(e)=>{e.stopPropagation();removeFromDeck(c.id)});
    r.addEventListener('click',()=>showCardDetail(c));
    el.appendChild(r);
  });
  $('#deckCount').textContent=`${state.deck.length} / 30`;
  $('#deckCount2').textContent=state.deck.length;
  // curve
  const curve=new Array(11).fill(0);
  state.deck.forEach(id=>{const c=state.pool.find(x=>x.id===id);if(c)curve[Math.min(c.cost,10)]++});
  const cmax=Math.max(...curve,1);
  const cv=$('#dkCurve');cv.innerHTML='';
  for(let i=1;i<=10;i++){
    const b=document.createElement('div');b.className='bar';b.style.height=(curve[i]/cmax*100)+'%';
    if(curve[i])b.innerHTML=`<span>${i}</span>`;
    cv.appendChild(b);
  }
  // status
  const st=$('#dkStatus');
  if(state.deck.length===30){
    // validate
    const counts2={};let bad=false;
    state.deck.forEach(id=>counts2[id]=(counts2[id]||0)+1);
    for(const[id,n]of Object.entries(counts2)){
      const c=state.pool.find(x=>x.id===id);
      const lim=c?.rarity==='legendary'?1:2;
      if(n>lim)bad=true;
    }
    st.className=bad?'dk-status invalid':'dk-status valid';
    st.textContent=bad?'invalid · check copies':'valid · ready to duel';
  }else{
    st.className='dk-status';
    st.textContent=`need ${30-state.deck.length} more`;
  }
}
function autoDeck(){
  state.deck=[];
  const pool=[...state.pool].sort(()=>Math.random()-.5);
  for(const c of pool){
    if(state.deck.length>=30)break;
    const cnt=state.deck.filter(id=>id===c.id).length;
    const lim=c.rarity==='legendary'?1:2;
    if(cnt<lim&&c.cost<=8)state.deck.push(c.id);
  }
  renderPool();
}
async function saveDeck(){
  const slot=$('#deckSlot').value;
  try{await IDB.put('decks',{slot,deck:state.deck.slice(),savedAt:Date.now()});log(`deck saved to ${slot}`,'evt')}catch(e){log('save failed','evt')}
}
async function loadDeck(slot){
  try{const d=await IDB.get('decks',slot);if(d){state.deck=d.deck||[];renderPool();log(`loaded deck ${slot}`,'evt')}}catch(e){}
}

// ============================================================
// Cascade T0/T2/T3
// ============================================================
const Cascade={
  async detectTier(){if(await this._probe())return'T2';const s=state.settings;if(s.anthropicKey||s.openaiKey||s.geminiKey||s.openrouterKey)return'T3';return'T0'},
  async _probe(){if(this._p!==undefined)return this._p;try{this._p=await Promise.race([fetch('http://127.0.0.1:11434/api/tags').then(r=>r.ok),new Promise(r=>setTimeout(()=>r(false),350))])}catch(e){this._p=false}return this._p},
  async generate(sys,user,maxTok){const s=state.settings,max=maxTok||1200;
    if(s.anthropicKey)try{const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':s.anthropicKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-haiku-4-5',max_tokens:max,system:sys,messages:[{role:'user',content:user}]})});const d=await r.json();return{tier:'T3·Claude',text:d?.content?.[0]?.text||''}}catch(e){}
    if(s.geminiKey)try{const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${s.geminiKey}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({systemInstruction:{parts:[{text:sys}]},contents:[{parts:[{text:user}]}]})});const d=await r.json();return{tier:'T3·Gemini',text:d?.candidates?.[0]?.content?.parts?.[0]?.text||''}}catch(e){}
    if(s.openaiKey)try{const r=await fetch('https://api.openai.com/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+s.openaiKey},body:JSON.stringify({model:'gpt-4o-mini',messages:[{role:'system',content:sys},{role:'user',content:user}]})});const d=await r.json();return{tier:'T3·GPT',text:d?.choices?.[0]?.message?.content||''}}catch(e){}
    if(s.openrouterKey)try{const r=await fetch('https://openrouter.ai/api/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+s.openrouterKey,'HTTP-Referer':location.origin},body:JSON.stringify({model:'anthropic/claude-haiku-4-5',messages:[{role:'system',content:sys},{role:'user',content:user}]})});const d=await r.json();return{tier:'T3·OpenRouter',text:d?.choices?.[0]?.message?.content||''}}catch(e){}
    return{tier:'T0',text:null}
  }
};
async function updateTierBadge(){const t=await Cascade.detectTier();const el=document.getElementById('tierBadge');if(el){el.textContent=t==='T0'?'offline':t;el.classList.toggle('t3',t!=='T0')}const pt=document.getElementById('pTier');if(pt){pt.textContent=t==='T0'?'T0':t;pt.classList.toggle('t3',t!=='T0')}}

// Ω autopilot palette
// ============================================================
const Palette={
  open(){$('#palette').classList.add('show');$('#pInput').value='';$('#pInput').focus();this.render([
    {name:'build me a deck around a faction',sub:'e.g. "around BARON"',run:()=>{}},
    {name:'find legendary cards',sub:'show all A-tier cards',run:()=>this.findRarity('legendary')},
    {name:'show match history',sub:'recent duels',run:()=>{$('.tab[data-tab=hist]').click?.();selectTab('hist');this.close()}},
    {name:'show NFT wallet',sub:'minted tokens',run:()=>{selectTab('wallet');this.close()}},
    {name:'new match',sub:'start vs AI',run:()=>{Game.newMatch();this.close()}},
    {name:'auto-build deck',sub:'random 30',run:()=>{autoDeck();this.close()}},
    {name:'concede',sub:'forfeit current match',run:()=>{Game.concede();this.close()}},
  ])},
  close(){$('#palette').classList.remove('show')},
  render(items){
    const b=$('#pBody');b.innerHTML='';
    items.forEach(it=>{
      const d=document.createElement('div');d.className='p-item';
      d.innerHTML=`<div>${esc(it.name)}</div><div class="sub">${esc(it.sub||'')}</div>`;
      d.addEventListener('click',()=>it.run());
      b.appendChild(d);
    });
  },
  findRarity(rar){
    const cards=state.pool.filter(c=>c.rarity===rar);
    this.render(cards.map(c=>({name:c.name,sub:`${c.faction} · ${c.cost}mp · ${c.attack}/${c.health} · π${c.prime}`,run:()=>{showCardDetail(c);this.close()}})));
  },
  async handle(q){
    q=q.trim();if(!q)return;
    const lc=q.toLowerCase();
    // T0 keyword routing
    if(/\b(legend(ary)?|a[- ]tier)\b/.test(lc))return this.findRarity('legendary');
    if(/\b(epic|b[- ]tier)\b/.test(lc))return this.findRarity('epic');
    if(/\b(rare)\b/.test(lc))return this.findRarity('rare');
    if(/\b(history|matches|past)\b/.test(lc)){selectTab('hist');return this.close()}
    if(/\b(wallet|nft|token)\b/.test(lc)){selectTab('wallet');return this.close()}
    if(/\b(new match|start|duel|play)\b/.test(lc)){Game.newMatch();return this.close()}
    if(/\b(concede|forfeit|quit match)\b/.test(lc)){Game.concede();return this.close()}
    if(/\b(auto|random) ?deck\b/.test(lc)){autoDeck();return this.close()}
    // faction match
    for(const f of state.factions){
      if(lc.includes(f.toLowerCase())){
        // build deck around faction
        const cards=state.pool.filter(c=>c.faction===f);
        if(/\b(build|deck)\b/.test(lc)){
          state.deck=[];
          const sorted=[...cards].sort((a,b)=>a.cost-b.cost);
          for(const c of sorted){
            if(state.deck.length>=30)break;
            const cnt=state.deck.filter(id=>id===c.id).length;
            const lim=c.rarity==='legendary'?1:2;
            if(cnt<lim)state.deck.push(c.id);
          }
          // fill with curve-balanced others if short
          if(state.deck.length<30){
            const rest=state.pool.filter(c=>c.faction!==f).sort((a,b)=>a.cost-b.cost);
            for(const c of rest){
              if(state.deck.length>=30)break;
              const cnt=state.deck.filter(id=>id===c.id).length;
              const lim=c.rarity==='legendary'?1:2;
              if(cnt<lim)state.deck.push(c.id);
            }
          }
          renderPool();
          log(`built deck around ${f}`,'evt');
          return this.close();
        }
        return this.render(cards.map(c=>({name:c.name,sub:`${f} · ${c.cost}mp · ${c.attack}/${c.health}`,run:()=>{showCardDetail(c);this.close()}})));
      }
    }
    // T3 fallback
    const tier=await Cascade.detectTier();
    if(tier!=='T0'){
      const cardSummary=state.pool.slice(0,30).map(c=>`${c.name}(${c.faction},${c.cost}mp,${c.attack}/${c.health},${c.rarity})`).join('; ');
      const sys=`You are an advisor for KARD v3 (Hearthstone-like CCG). Cards: ${cardSummary}. Factions: ${state.factions.join(',')}. Answer concisely (<150 words).`;
      const r=await Cascade.generate(sys,q,400);
      this.render([{name:'autopilot reply',sub:tier,run:()=>{}}]);
      const d=document.createElement('div');d.style.padding='14px';d.style.fontSize='12px';d.textContent=r.text||'(no reply)';
      $('#pBody').appendChild(d);
    }else{
      this.render([{name:'unknown intent',sub:'try: legendaries, history, build around MAGE',run:()=>{}}]);
    }
  }
};

// ============================================================
// KONOMI shim + NFT hook + fallmesh + postMessage
// ============================================================
async function sha256(str){
  const enc=new TextEncoder().encode(str);
  const buf=await crypto.subtle.digest('SHA-256',enc);
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
}

window.KONOMI={active:true,tier:'sovereign',prime:PRIME,check:()=>({ok:true,tier:'sovereign'})};

// KONOMI_NFT_HOOK · sovereign localStorage/IDB stub · v3.1 will swap _impl for real chain
window.KONOMI.nft={
  // returns {tokenId, ownerKey, mintedAt, txHash, card}
  async mint(card,ownerKey){
    const seed=card.id+'·'+card.prime+'·'+ownerKey+'·'+Date.now()+'·'+Math.random();
    const tokenId=await sha256(seed);
    const token={tokenId,ownerKey,mintedAt:new Date().toISOString(),txHash:null,card:card.id,prime:card.prime};
    try{await IDB.put('wallet',token)}catch(e){}
    state.wallet.push(token);
    return token;
  },
  async verify(tokenId){return state.wallet.find(t=>t.tokenId===tokenId)||null},
  async transfer(tokenId,to){
    const t=state.wallet.find(x=>x.tokenId===tokenId);
    if(!t)return null;
    t.ownerKey=to;
    try{await IDB.put('wallet',t)}catch(e){}
    return t;
  },
  async list(ownerKey){return state.wallet.filter(t=>t.ownerKey===ownerKey)},
  _impl:'localStorage-stub' // swap for real chain when Thomas slots in
};

try{
  const sig=new BroadcastChannel('fall-signal');
  sig.postMessage({source:TOOLNAME,type:'hello',prime:PRIME,version:VERSION,ts:Date.now()});
  sig.addEventListener('message',e=>{const m=e.data;if(m&&m.type==='ping')sig.postMessage({source:TOOLNAME,type:'pong',prime:PRIME})});
}catch(e){}

window.addEventListener('message',async e=>{
  const m=e.data;if(!m||m.target!==TOOLNAME||!m.action)return;
  let r=null;
  if(m.action==='ping')r={ok:true,prime:PRIME,version:VERSION};
  else if(m.action==='cards')r={count:state.pool.length,cards:state.pool.slice(0,30)};
  else if(m.action==='mint'&&m.card)r=await window.KONOMI.nft.mint(m.card,m.ownerKey||'mesh-anon');
  e.source?.postMessage({target:m.source||'*',responseTo:m.action,data:r},'*');
});

const $=s=>document.querySelector(s);
const el=id=>document.getElementById(id);
function esc(s){return String(s||'').replace(/[<>&"]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]))}
function selectTab(name){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===name));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.toggle('active',p.dataset.panel===name));
}
async function loadSettings(){
  try{
    for(const k of ['ownerKey','anthropicKey','openaiKey','geminiKey','openrouterKey']){
      const v=await IDB.get('settings',k);if(v)state.settings[k]=v.v;
    }
  }catch(e){}
}
async function saveSettings(){
  state.settings.ownerKey=$('#setOwnerKey').value;
  state.settings.anthropicKey=$('#setAnth').value;
  state.settings.openaiKey=$('#setOpenai').value;
  state.settings.geminiKey=$('#setGem').value;

}
async function boot(){
  await loadSettings();
  Scene.init();
  // wire UI
  $('#cardSearch').addEventListener('input',renderPool);
  $('#factionFilter').addEventListener('change',renderPool);
  $('#rarityFilter').addEventListener('change',renderPool);
  $('#btnAutoDeck').addEventListener('click',autoDeck);
  $('#btnClearDeck').addEventListener('click',()=>{state.deck=[];renderPool()});
  $('#btnSaveDeck').addEventListener('click',saveDeck);
  $('#deckSlot').addEventListener('change',e=>loadDeck(e.target.value));
  $('#btnNewMatch').addEventListener('click',()=>Game.newMatch());
  $('#btnEndTurn').addEventListener('click',()=>Game.endTurn());
  $('#btnConcede').addEventListener('click',()=>{if(confirm('concede match?'))Game.concede()});
  $('#btnSettings').addEventListener('click',()=>{
    $('#setOwnerKey').value=state.settings.ownerKey||'';
    $('#setAnth').value=state.settings.anthropicKey||'';
    $('#setOpenai').value=state.settings.openaiKey||'';
    $('#setGem').value=state.settings.geminiKey||'';
    $('#setOR').value=state.settings.openrouterKey||'';
    $('#setModal').classList.add('show');
  });
  $('#setClose').addEventListener('click',()=>$('#setModal').classList.remove('show'));
  $('#setSave').addEventListener('click',saveSettings);
  $('#setReset').addEventListener('click',async()=>{
    if(!confirm('wipe ALL data (deck, history, wallet, settings)?'))return;
    for(const s of['decks','matches','wallet','settings','pool'])await IDB.clear(s);
    location.reload();
  });
  $('#btnPalette').addEventListener('click',()=>Palette.open());
  document.addEventListener('keydown',e=>{
    if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();Palette.open()}
    if(e.key==='Escape'){
      $('#cardModal').classList.remove('show');
      $('#setModal').classList.remove('show');
      $('#palette').classList.remove('show');
    }
    if(e.key==='Enter'&&document.activeElement===$('#pInput')){Palette.handle($('#pInput').value)}
  });
  $('#cdClose').addEventListener('click',()=>$('#cardModal').classList.remove('show'));
  $('#cardModal').addEventListener('click',e=>{if(e.target.id==='cardModal')$('#cardModal').classList.remove('show')});
  $('#setModal').addEventListener('click',e=>{if(e.target.id==='setModal')$('#setModal').classList.remove('show')});
  $('#palette').addEventListener('click',e=>{if(e.target.id==='palette')Palette.close()});
  document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>selectTab(t.dataset.tab)));
  // load registry + decks
  await loadRegistry();
  await loadDeck('default');
  await renderHistory();
  await renderWallet();
  await updateTierBadge();
  log('KARD v3 ready · prime 787 · pool '+state.pool.length+' cards','evt');
  log('build a 30-card deck and click NEW MATCH · or press Ctrl+K','evt');
}
